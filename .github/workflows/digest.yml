name: Daily AI Digest

on:
  schedule:
    - cron: '0 0 * * *'   # 8am Singapore time (UTC+8)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit docs/ and seen_urls.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser python-dotenv

      - name: Generate digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openai/gpt-4o-mini
        run: python digest.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ seen_urls.json
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d')"
          git push
