name: Daily AI Digest

on:
  schedule:
    - cron: '0 0 * * *'   # 8am Singapore time (UTC+8)
  workflow_dispatch:        # allows manual trigger from GitHub UI

concurrency:
  group: daily-ai-digest
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit generated docs back

    steps:
      - name: Checkout repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_REF_NAME}"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Generate digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openai/gpt-4o-mini
          DIGEST_TIMEZONE: Asia/Singapore
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Singapore
        run: python3 digest.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ seen_urls.json
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d')"
          git push
